services:
  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:8080"
    environment:
      - NODE_ENV=production
      - DB_HOST=mysql
      - DB_USER=${DB_USER:-gabriel}
      - DB_PASSWORD=${DB_PASSWORD:-12345678}
      - DB_NAME=${DB_NAME:-free-trial-first-project}
      - DB_PORT=3306
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-gcp}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_BUCKET_NAME=${GCP_BUCKET_NAME}
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-}
      - AZURE_CONTAINER_NAME=${AZURE_CONTAINER_NAME:-}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      # Mount GCP credentials if using GCP
      - ~/.config/gcloud:/home/nextjs/.config/gcloud:ro
    networks:
      - app-network
    restart: unless-stopped

  # MySQL Database
  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-12345678}
      - MYSQL_DATABASE=${DB_NAME:-free-trial-first-project}
      - MYSQL_USER=${DB_USER:-gabriel}
      - MYSQL_PASSWORD=${DB_PASSWORD:-12345678}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

volumes:
  mysql-data:
    driver: local

networks:
  app-network:
    driver: bridge
